name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

  # Manual trigger for deploy — only runs when YOU click "Run workflow"
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'What to deploy'
        required: true
        type: choice
        options:
          - lambda
          - docker
          - release
      confirm_deploy:
        description: 'Type "yes" to confirm deployment'
        required: true
        type: string

jobs:
  # ─────────────────────────────────────────────
  # ALWAYS RUNS — on every push and PR
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
    
    - name: Lint with flake8
      run: |
        flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics
    
    - name: Check code formatting with black
      run: |
        black --check src
    
    - name: Type check with mypy
      run: |
        mypy src --ignore-missing-imports
      continue-on-error: true
    
    - name: Run tests
      env:
        AWS_ACCESS_KEY_ID: testing
        AWS_SECRET_ACCESS_KEY: testing
        AWS_DEFAULT_REGION: us-east-1
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=html
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  # ─────────────────────────────────────────────
  # MANUAL ONLY — Deploy to Lambda
  # ─────────────────────────────────────────────
  deploy-lambda:
    name: Deploy to AWS Lambda
    runs-on: ubuntu-latest
    needs: test
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy_target == 'lambda' &&
      github.event.inputs.confirm_deploy == 'yes'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Package for Lambda
      run: |
        mkdir -p build
        cp -r src build/
        cp lambda_handler.py build/
        cp config.yaml build/
        cd build

        # Install only runtime deps (no boto3, no dev tools)
        pip install -r ../requirements.txt -t . \
          --quiet --no-cache-dir

        # Remove bloat that should never be in Lambda
        rm -rf \
          boto3* botocore* s3transfer* urllib3* \
          pytest* _pytest* moto* mypy* black* coverage* \
          numpy* pandas* scipy* sklearn* \
          __pycache__ *.dist-info *.egg-info \
          tests/ test/ docs/ examples/ bin/

        find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
        find . \( -name "*.pyc" -o -name "*.pyo" \) -delete 2>/dev/null || true

        zip -r ../aws-cost-sentinel.zip . \
          -x "*.git*" "*.DS_Store" "__pycache__/*"
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    
    - name: Deploy to Lambda
      env:
        FUNCTION_NAME: aws-cost-sentinel
      run: |
        aws lambda update-function-code \
          --function-name $FUNCTION_NAME \
          --zip-file fileb://aws-cost-sentinel.zip
        echo "✅ Deployed to Lambda: $FUNCTION_NAME"

  # ─────────────────────────────────────────────
  # MANUAL ONLY — Build & Push Docker Image
  # ─────────────────────────────────────────────
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy_target == 'docker' &&
      github.event.inputs.confirm_deploy == 'yes'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        tags: aws-cost-sentinel:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Test Docker image
      run: |
        docker run --rm aws-cost-sentinel:${{ github.sha }} python -c "from src.sentinel import CostSentinel; print('OK')"

  # ─────────────────────────────────────────────
  # MANUAL ONLY — Create Release Assets
  # ─────────────────────────────────────────────
  release:
    name: Create Release Assets
    runs-on: ubuntu-latest
    needs: test
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy_target == 'release' &&
      github.event.inputs.confirm_deploy == 'yes'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Create deployment package
      run: |
        VERSION=$(date +%Y%m%d-%H%M%S)
        zip -r aws-cost-sentinel-${VERSION}.zip \
          src/ \
          config.yaml \
          requirements.txt \
          requirements-dev.txt \
          lambda_handler.py \
          sentinel_cli.py \
          README.md \
          LICENSE \
          -x "*.git*" "*.pyc" "__pycache__/*"
        echo "📦 Release package created: aws-cost-sentinel-${VERSION}.zip"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: release-package
        path: aws-cost-sentinel-*.zip
        retention-days: 30